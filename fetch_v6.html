<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --a50:#FAEEDA;--a200:#EF9F27;--a400:#BA7517;--a600:#854F0B;
  --g50:#EAF3DE;--g600:#3B6D11;
  --t50:#E1F5EE;--t600:#0F6E56;
  --p50:#EEEDFE;--p600:#534AB7;
  --c50:#FAECE7;--c600:#993C1D;
  --bl50:#E6F1FB;--bl600:#185FA5;
  --bg:var(--color-background-tertiary,#FAFAF8);
  --bg2:var(--color-background-secondary,#F1EFE8);
  --card:var(--color-background-primary,#fff);
  --text:var(--color-text-primary,#2C2C2A);
  --text2:var(--color-text-secondary,#5F5E5A);
  --text3:var(--color-text-tertiary,#888780);
  --border:var(--color-border-tertiary,rgba(44,44,42,0.12));
  --r:16px;--rsm:10px
}
body{font-family:var(--font-sans,-apple-system,BlinkMacSystemFont,sans-serif);background:var(--bg);color:var(--text);min-height:100vh;max-width:390px;margin:0 auto;overflow-x:hidden}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg);position:sticky;top:0;z-index:10;border-bottom:0.5px solid var(--border)}
.header-left{display:flex;align-items:center;gap:10px}
.app-icon{width:38px;height:38px;border-radius:10px;object-fit:cover}
.app-title{font-size:20px;font-weight:500;color:var(--text);letter-spacing:-0.3px}
.date-pill{font-size:12px;color:var(--a600);background:var(--a50);padding:4px 10px;border-radius:20px;font-weight:500}
.view-toggle{display:flex;margin:14px 20px 0;background:var(--bg2);border-radius:var(--rsm);padding:3px;gap:2px}
.toggle-btn{flex:1;padding:7px 0;border:none;border-radius:8px;font-size:13px;font-weight:400;cursor:pointer;background:transparent;color:var(--text3);transition:all .18s}
.toggle-btn.active{background:var(--card);color:var(--text)}
.tag-filter-row{display:flex;gap:6px;padding:12px 20px 0;overflow-x:auto;scrollbar-width:none}
.tag-filter-row::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:5px 10px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);color:var(--text3);cursor:pointer;transition:all .15s}
.filter-chip.act-treat{background:var(--a50);color:var(--a600);border-color:var(--a200)}
.filter-chip.act-zoomies{background:var(--g50);color:var(--g600);border-color:#97C459}
.filter-chip.act-hunt{background:var(--bl50);color:var(--bl600);border-color:#85B7EB}
.filter-chip.act-snooze{background:var(--p50);color:var(--p600);border-color:#AFA9EC}
.filter-chip.act-wag{background:var(--c50);color:var(--c600);border-color:#F0997B}
.filter-chip.act-pack{background:var(--t50);color:var(--t600);border-color:#5DCAA5}
.feed{padding:16px 20px;flex:1}
.entry-card{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);padding:16px;margin-bottom:14px;cursor:pointer;transition:transform .12s}
.entry-card:active{transform:scale(0.98)}
.entry-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.entry-date{font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.4px}
.entry-title{font-size:16px;font-weight:500;color:var(--text);margin-top:2px}
.mood-badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;flex-shrink:0}
.mood-great{background:var(--g50);color:var(--g600)}
.mood-okay{background:var(--a50);color:var(--a600)}
.mood-rough{background:#FCEBEB;color:#A32D2D}
.entry-body{font-size:14px;color:var(--text2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.entry-photo-thumb{width:100%;height:140px;border-radius:10px;margin-top:12px;object-fit:cover;display:block}
.entry-tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.entry-tag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:3px}
.tag-treat{background:var(--a50);color:var(--a600)}
.tag-zoomies{background:var(--g50);color:var(--g600)}
.tag-hunt{background:var(--bl50);color:var(--bl600)}
.tag-snooze{background:var(--p50);color:var(--p600)}
.tag-wag{background:var(--c50);color:var(--c600)}
.tag-pack{background:var(--t50);color:var(--t600)}
.entry-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)}
.entry-time{font-size:11px;color:var(--text3)}
.sleep-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;color:var(--p600);background:var(--p50);padding:4px 10px;border-radius:20px;margin-top:8px}
.feed.hidden{display:none}
.write-screen{display:none;flex-direction:column;flex:1}
.write-screen.active{display:flex}
.write-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:0.5px solid var(--border)}
.write-cancel{font-size:15px;font-weight:400;border:none;background:none;cursor:pointer;color:var(--text3);padding:4px 0}
.write-save{font-size:15px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--a400);padding:4px 0}
.write-label{font-size:16px;font-weight:500;color:var(--text)}
.write-body{padding:20px;flex:1;display:flex;flex-direction:column;gap:18px;overflow-y:auto}
.field-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px}
.write-title-input{width:100%;font-size:18px;font-weight:500;color:var(--text);background:transparent;border:none;outline:none;font-family:inherit}
.write-title-input::placeholder{color:var(--text3);font-weight:400}
.write-textarea{width:100%;min-height:100px;font-size:15px;color:var(--text);background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rsm);padding:12px;outline:none;font-family:inherit;line-height:1.6;resize:none}
.write-textarea::placeholder{color:var(--text3)}
.mood-row{display:flex;gap:8px}
.mood-btn{flex:1;padding:9px 0;border:0.5px solid var(--border);border-radius:var(--rsm);background:var(--card);font-size:13px;font-weight:400;color:var(--text2);cursor:pointer;transition:all .14s}
.mood-btn.sel-great{background:var(--g50);border-color:#639922;color:var(--g600)}
.mood-btn.sel-okay{background:var(--a50);border-color:var(--a200);color:var(--a600)}
.mood-btn.sel-rough{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D}
.cat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.cat-btn{padding:14px 8px 12px;border:0.5px solid var(--border);border-radius:var(--rsm);background:var(--card);cursor:pointer;text-align:center;transition:all .14s;display:flex;flex-direction:column;align-items:center;gap:8px}
.cat-btn .cat-bubble{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cat-btn .cat-name{font-size:13px;font-weight:500;color:var(--text2)}
.cat-btn .cat-sub{font-size:10px;color:var(--text3)}
.cat-btn.sel-treat{background:var(--a50);border-color:var(--a200)}
.cat-btn.sel-zoomies{background:var(--g50);border-color:#97C459}
.cat-btn.sel-hunt{background:var(--bl50);border-color:#85B7EB}
.cat-btn.sel-snooze{background:var(--p50);border-color:#AFA9EC}
.cat-btn.sel-wag{background:var(--c50);border-color:#F0997B}
.cat-btn.sel-pack{background:var(--t50);border-color:#5DCAA5}
.sleep-section{background:var(--p50);border:0.5px solid #AFA9EC;border-radius:var(--rsm);padding:16px;display:flex;flex-direction:column;gap:12px}
.sleep-time-row{display:flex;gap:10px;align-items:center}
.sleep-time-block{flex:1;display:flex;flex-direction:column;gap:4px}
.sleep-time-label{font-size:11px;font-weight:500;color:var(--p600);text-transform:uppercase;letter-spacing:0.5px}
.sleep-time-input{width:100%;padding:8px 10px;border:0.5px solid #AFA9EC;border-radius:8px;background:var(--card);font-size:15px;font-weight:500;color:var(--p600);font-family:inherit;outline:none;text-align:center}
.sleep-duration{text-align:center;font-size:13px;color:var(--p600);font-weight:500;padding:6px;background:var(--card);border-radius:8px;border:0.5px solid #AFA9EC}
.sleep-quality{display:flex;gap:6px}
.sleep-q-btn{flex:1;padding:7px 4px;border:0.5px solid #AFA9EC;border-radius:8px;background:var(--card);font-size:12px;font-weight:500;color:var(--p600);cursor:pointer;text-align:center;transition:all .14s}
.sleep-q-btn.sel{background:var(--p600);color:white;border-color:var(--p600)}
.photo-preview{width:100%;border-radius:var(--rsm);overflow:hidden;position:relative}
.photo-preview img{width:100%;max-height:200px;object-fit:cover;display:block}
.photo-remove{position:absolute;top:8px;right:8px;width:24px;height:24px;background:rgba(0,0,0,0.5);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.add-photo-btn{width:100%;padding:12px;border:0.5px dashed var(--border);border-radius:var(--rsm);background:transparent;color:var(--text3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
#photo-input{display:none}
.fab{position:fixed;bottom:28px;right:24px;width:54px;height:54px;background:var(--a200);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .14s;z-index:20}
.fab:active{transform:scale(0.92)}
.fab.hidden{display:none}
.month-divider{font-size:13px;font-weight:500;color:var(--text3);margin:4px 0 12px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center}
.empty-title{font-size:17px;font-weight:500;color:var(--text)}
.empty-sub{font-size:14px;color:var(--text3);line-height:1.5}
.detail-screen{display:none;flex-direction:column;flex:1}
.detail-screen.active{display:flex}
.detail-header{display:flex;align-items:center;padding:16px 20px;border-bottom:0.5px solid var(--border)}
.back-btn{border:none;background:none;color:var(--a400);font-size:15px;font-weight:500;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px}
.detail-body{padding:20px;flex:1;overflow-y:auto}
.detail-date{font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px}
.detail-title{font-size:22px;font-weight:500;color:var(--text);margin-bottom:12px;letter-spacing:-0.3px}
.detail-img{width:100%;border-radius:var(--rsm);margin-bottom:16px;object-fit:cover;max-height:240px;display:block}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.detail-text{font-size:16px;color:var(--text2);line-height:1.7}
.detail-sleep{background:var(--p50);border:0.5px solid #AFA9EC;border-radius:var(--rsm);padding:14px;margin-bottom:14px}
.detail-sleep-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.detail-sleep-label{font-size:12px;color:var(--p600);font-weight:500}
.detail-sleep-val{font-size:14px;color:var(--p600);font-weight:500}
</style>

              <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><ellipse cx="8" cy="11" rx="3" ry="4" fill="white"/><ellipse cx="5.5" cy="16" rx="2" ry="1.5" fill="white"/><ellipse cx="10.5" cy="16" rx="2" ry="1.5" fill="white"/><ellipse cx="8.4" cy="8.5" rx="1.5" ry="1" fill="white"/><ellipse cx="20" cy="11" rx="3" ry="4" fill="white"/><ellipse cx="17.5" cy="16" rx="2" ry="1.5" fill="white"/><ellipse cx="22.5" cy="16" rx="2" ry="1.5" fill="white"/><ellipse cx="20.4" cy="8.5" rx="1.5" ry="1" fill="white"/><ellipse cx="14" cy="17" rx="3" ry="4" fill="white" opacity="0.7"/><ellipse cx="11.5" cy="22" rx="2" ry="1.5" fill="white" opacity="0.7"/><ellipse cx="16.5" cy="22" rx="2" ry="1.5" fill="white" opacity="0.7"/></svg>
            </div>
            <span class="cat-name">Pack</span>
            <span class="cat-sub">people</span>
          </button>
        </div>
      </div>

      <div id="sleep-section" style="display:none">
        <div class="field-label">Sleep tracker</div>
        <div class="sleep-section">
          <div class="sleep-time-row">
            <div class="sleep-time-block">
              <div class="sleep-time-label">Bedtime</div>
              <input type="time" class="sleep-time-input" id="sleep-start" value="23:00" onchange="updateDuration()">
            </div>
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="flex-shrink:0;margin-top:20px"><path d="M4 10h12M12 6l4 4-4 4" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="sleep-time-block">
              <div class="sleep-time-label">Wake up</div>
              <input type="time" class="sleep-time-input" id="sleep-end" value="07:00" onchange="updateDuration()">
            </div>
          </div>
          <div class="sleep-duration" id="sleep-duration">8h 0m sleep</div>
          <div>
            <div class="sleep-time-label" style="margin-bottom:6px">Sleep quality</div>
            <div class="sleep-quality">
              <button class="sleep-q-btn" data-q="poor" onclick="selectSleepQ('poor')">Poor</button>
              <button class="sleep-q-btn" data-q="okay" onclick="selectSleepQ('okay')">Okay</button>
              <button class="sleep-q-btn" data-q="good" onclick="selectSleepQ('good')">Good</button>
              <button class="sleep-q-btn" data-q="great" onclick="selectSleepQ('great')">Great</button>
            </div>
          </div>
          <div>
            <div class="sleep-time-label" style="margin-bottom:6px">Sleep notes</div>
            <textarea class="write-textarea" id="sleep-notes" placeholder="Dreams? Woke up? Restless?" style="min-height:70px"></textarea>
          </div>
        </div>
      </div>

      <div>
        <div class="field-label">Your thoughts</div>
        <textarea class="write-textarea" id="write-body" placeholder="What happened? What are you thinking about?"></textarea>
      </div>
      <div>
        <div class="field-label">Photo</div>
        <div id="photo-area">
          <button class="add-photo-btn" onclick="document.getElementById('photo-input').click()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 3L6.5 1h3L11 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            Add a photo
          </button>
        </div>
        <input type="file" id="photo-input" accept="image/*" onchange="handlePhoto(event)">
      </div>
    </div>
  </div>

  <div class="detail-screen" id="detail-screen">
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">
        <svg width="8" height="13" viewBox="0 0 8 13" fill="none"><path d="M7 1L1 6.5L7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </button>
    </div>
    <div class="detail-body">
      <div class="detail-date" id="detail-date"></div>
      <div class="detail-title" id="detail-title"></div>
      <div id="detail-sleep" style="display:none" class="detail-sleep">
        <div class="detail-sleep-row"><span class="detail-sleep-label">Bedtime</span><span class="detail-sleep-val" id="ds-start"></span></div>
        <div class="detail-sleep-row"><span class="detail-sleep-label">Wake up</span><span class="detail-sleep-val" id="ds-end"></span></div>
        <div class="detail-sleep-row"><span class="detail-sleep-label">Duration</span><span class="detail-sleep-val" id="ds-dur"></span></div>
        <div class="detail-sleep-row"><span class="detail-sleep-label">Quality</span><span class="detail-sleep-val" id="ds-q"></span></div>
        <div id="ds-notes-wrap" style="display:none;margin-top:8px;font-size:14px;color:var(--p600)" id="ds-notes"></div>
      </div>
      <div class="detail-tags" id="detail-tags"></div>
      <img class="detail-img" id="detail-img" style="display:none">
      <div class="detail-text" id="detail-text"></div>
    </div>
  </div>

  <button class="fab" id="fab" onclick="openWrite()">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 4V18M4 11H18" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
</div>

<script>
const TAG_ICONS={
  treat:'<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" fill="#78C44A"/><path d="M6 2C4 2 2.5 3.5 2.5 6c0 2.5 1.5 4 3.5 5 2-1 3.5-2.5 3.5-5C9.5 3.5 8 2 6 2z" fill="white"/></svg>',
  zoomies:'<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" fill="#78C44A"/><path d="M2 9 Q3 5 6 4.5 Q9 4 10 7" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none"/><circle cx="10" cy="7" r="1.5" fill="white"/></svg>',
  hunt:'<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" fill="#4A90D9"/><rect x="2" y="4" width="7" height="5" rx="1" stroke="white" stroke-width="1"/><path d="M9 5.5h1.5v2H9" stroke="white" stroke-width="1" stroke-linecap="round"/></svg>',
  snooze:'<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" fill="#F08080"/><path d="M9 7A4 4 0 1 1 5 3a3 3 0 0 0 4 4z" fill="white"/><circle cx="9.5" cy="2.5" r="0.8" fill="white"/><circle cx="11" cy="4" r="0.6" fill="white"/></svg>',
  wag:'<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" fill="#F0A040"/><ellipse cx="6" cy="6" rx="3" ry="3" fill="white" opacity="0.85"/><path d="M8 8.5 Q10 10 9.5 11" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none"/></svg>',
  pack:'<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" fill="#40BFA0"/><ellipse cx="3.5" cy="5" rx="1.2" ry="1.6" fill="white"/><ellipse cx="2.8" cy="6.8" rx="0.8" ry="0.6" fill="white"/><ellipse cx="4.2" cy="6.8" rx="0.8" ry="0.6" fill="white"/><ellipse cx="8.5" cy="5" rx="1.2" ry="1.6" fill="white"/><ellipse cx="7.8" cy="6.8" rx="0.8" ry="0.6" fill="white"/><ellipse cx="9.2" cy="6.8" rx="0.8" ry="0.6" fill="white"/></svg>'
};

let entries=[],selectedMood='',selectedCat='',currentPhotoData=null,activeFilter=null,currentViewMode='all',sleepQuality='';
const SK='fetch_entries_v5';

async function loadEntries(){try{const r=await window.storage.get(SK);if(r&&r.value)entries=JSON.parse(r.value);}catch(e){entries=[];}renderFeed();}
async function saveSt(){try{await window.storage.set(SK,JSON.stringify(entries));}catch(e){}}
function fmt(iso){return new Date(iso).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}
function fmtTime(iso){return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function fmtMonth(iso){return new Date(iso).toLocaleDateString('en-US',{month:'long',year:'numeric'});}
function moodLabel(m){return m==='great'?'Good day':m==='okay'?'Okay':'Rough';}
function calcDuration(start,end){
  if(!start||!end)return'';
  const[sh,sm]=start.split(':').map(Number);
  const[eh,em]=end.split(':').map(Number);
  let mins=(eh*60+em)-(sh*60+sm);
  if(mins<0)mins+=1440;
  const h=Math.floor(mins/60),m=mins%60;
  return h+'h '+(m>0?m+'m ':'')+'sleep';
}
function updateDuration(){
  const s=document.getElementById('sleep-start').value;
  const e=document.getElementById('sleep-end').value;
  document.getElementById('sleep-duration').textContent=calcDuration(s,e)||'Set times above';
}
function selectSleepQ(q){
  sleepQuality=q;
  document.querySelectorAll('.sleep-q-btn').forEach(b=>b.classList.toggle('sel',b.dataset.q===q));
}

function renderFeed(){
  const c=document.getElementById('entries-container');
  let f=[...entries];
  if(currentViewMode==='month'){const n=new Date();f=f.filter(e=>{const d=new Date(e.date);return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();});}
  if(activeFilter)f=f.filter(e=>e.cat===activeFilter);
  f.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!f.length){c.innerHTML='<div class="empty-state"><svg width="56" height="56" viewBox="0 0 56 56" fill="none"><ellipse cx="28" cy="34" rx="16" ry="13" fill="#FAC775"/><ellipse cx="28" cy="33" rx="12" ry="11" fill="#FAEEDA"/><circle cx="23" cy="30" r="2.2" fill="#633806"/><circle cx="33" cy="30" r="2.2" fill="#633806"/><ellipse cx="28" cy="35" rx="3.5" ry="2.2" fill="#EF9F27"/><ellipse cx="14" cy="24" rx="4.5" ry="7" fill="#FAC775" transform="rotate(-20 14 24)"/><ellipse cx="42" cy="24" rx="4.5" ry="7" fill="#FAC775" transform="rotate(20 42 24)"/></svg><div class="empty-title">No entries yet</div><div class="empty-sub">Tap + to record your first day.</div></div>';return;}
  let html='',lastMonth='';
  f.forEach(e=>{
    const m=fmtMonth(e.date);
    if(m!==lastMonth){html+='<div class="month-divider">'+m+'</div>';lastMonth=m;}
    const ri=entries.indexOf(e);
    const catIcon=e.cat?(TAG_ICONS[e.cat]||''):'';
    const catTag=e.cat?'<span class="entry-tag tag-'+e.cat+'">'+catIcon+e.cat+'</span>':'';
    const sleepHtml=e.sleep?'<div class="sleep-badge"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M9 7A4 4 0 1 1 5 3a3 3 0 0 0 4 4z" fill="currentColor"/><circle cx="9.5" cy="2.5" r="0.8" fill="currentColor"/><circle cx="11" cy="4" r="0.6" fill="currentColor"/></svg>'+calcDuration(e.sleep.start,e.sleep.end)+(e.sleep.quality?' · '+e.sleep.quality:'')+'</div>':'';
    html+='<div class="entry-card" onclick="openDetail('+ri+')"><div class="entry-header"><div><div class="entry-date">'+fmt(e.date)+'</div><div class="entry-title">'+(e.title||'Untitled')+'</div></div>'+(e.mood?'<span class="mood-badge mood-'+e.mood+'">'+moodLabel(e.mood)+'</span>':'')+'</div>'+(e.body?'<div class="entry-body">'+e.body+'</div>':'')+sleepHtml+(catTag?'<div class="entry-tags-row">'+catTag+'</div>':'')+(e.photo?'<img class="entry-photo-thumb" src="'+e.photo+'" loading="lazy">':'')+'<div class="entry-footer"><span></span><span class="entry-time">'+fmtTime(e.date)+'</span></div></div>';
  });
  c.innerHTML=html;
}

function switchView(v){currentViewMode=v;document.querySelectorAll('.toggle-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&v==='all')||(i===1&&v==='month')));renderFeed();}
function toggleFilter(tag){activeFilter=activeFilter===tag?null:tag;document.querySelectorAll('.filter-chip').forEach(c=>{c.className='filter-chip'+(activeFilter===c.dataset.tag?' act-'+c.dataset.tag:'');});renderFeed();}

function selectCat(cat){
  selectedCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.className='cat-btn'+(b.dataset.tag===cat?' sel-'+cat:''));
  document.getElementById('sleep-section').style.display=cat==='snooze'?'block':'none';
}

function openWrite(){
  document.getElementById('feed-view').classList.add('hidden');
  ['view-toggle','tag-filter-row'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('write-screen').classList.add('active');
  document.getElementById('fab').classList.add('hidden');
  selectedMood='';selectedCat='';currentPhotoData=null;sleepQuality='';
  document.getElementById('write-title').value='';
  document.getElementById('write-body').value='';
  document.getElementById('sleep-notes').value='';
  document.getElementById('sleep-section').style.display='none';
  document.getElementById('sleep-start').value='23:00';
  document.getElementById('sleep-end').value='07:00';
  updateDuration();
  resetPhotoArea();
  ['great','okay','rough'].forEach(m=>document.getElementById('mood-'+m).className='mood-btn');
  document.querySelectorAll('.cat-btn').forEach(b=>b.className='cat-btn');
  document.querySelectorAll('.sleep-q-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('write-title').focus();
}
function closeWrite(){
  document.getElementById('feed-view').classList.remove('hidden');
  ['view-toggle','tag-filter-row'].forEach(id=>document.getElementById(id).style.display='flex');
  document.getElementById('write-screen').classList.remove('active');
  document.getElementById('fab').classList.remove('hidden');
}
function selectMood(m){selectedMood=m;['great','okay','rough'].forEach(mood=>document.getElementById('mood-'+mood).className='mood-btn'+(mood===m?' sel-'+mood:''));}
function resetPhotoArea(){document.getElementById('photo-area').innerHTML='<button class="add-photo-btn" onclick="document.getElementById(\'photo-input\').click()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 3L6.5 1h3L11 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>Add a photo</button>';document.getElementById('photo-input').value='';}
function handlePhoto(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{currentPhotoData=ev.target.result;document.getElementById('photo-area').innerHTML='<div class="photo-preview"><img src="'+currentPhotoData+'"><button class="photo-remove" onclick="removePhoto()"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1L9 9M9 1L1 9" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></button></div>';};r.readAsDataURL(file);}
function removePhoto(){currentPhotoData=null;resetPhotoArea();}

async function saveEntry(){
  const title=document.getElementById('write-title').value.trim();
  const body=document.getElementById('write-body').value.trim();
  if(!title&&!body&&!currentPhotoData){closeWrite();return;}
  const entry={id:Date.now(),date:new Date().toISOString(),title:title||'Untitled',body,mood:selectedMood,cat:selectedCat,photo:currentPhotoData||null,sleep:null};
  if(selectedCat==='snooze'){
    entry.sleep={
      start:document.getElementById('sleep-start').value,
      end:document.getElementById('sleep-end').value,
      quality:sleepQuality,
      notes:document.getElementById('sleep-notes').value.trim()
    };
  }
  entries.unshift(entry);
  await saveSt();closeWrite();renderFeed();
}

function openDetail(idx){
  const e=entries[idx];if(!e)return;
  document.getElementById('feed-view').classList.add('hidden');
  ['view-toggle','tag-filter-row'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('detail-date').textContent=fmt(e.date)+' · '+fmtTime(e.date);
  document.getElementById('detail-title').textContent=e.title||'Untitled';
  const sleepEl=document.getElementById('detail-sleep');
  if(e.sleep){
    sleepEl.style.display='block';
    document.getElementById('ds-start').textContent=e.sleep.start||'—';
    document.getElementById('ds-end').textContent=e.sleep.end||'—';
    document.getElementById('ds-dur').textContent=calcDuration(e.sleep.start,e.sleep.end)||'—';
    document.getElementById('ds-q').textContent=e.sleep.quality||'—';
    const nw=document.getElementById('ds-notes-wrap');
    if(e.sleep.notes){nw.style.display='block';nw.textContent=e.sleep.notes;}else{nw.style.display='none';}
  }else{sleepEl.style.display='none';}
  const catIcon=e.cat?(TAG_ICONS[e.cat]||''):'';
  document.getElementById('detail-tags').innerHTML=e.cat?'<span class="entry-tag tag-'+e.cat+'">'+catIcon+e.cat+'</span>':'';
  const img=document.getElementById('detail-img');
  if(e.photo){img.src=e.photo;img.style.display='block';}else{img.style.display='none';}
  document.getElementById('detail-text').textContent=e.body||'';
  document.getElementById('detail-screen').classList.add('active');
  document.getElementById('fab').classList.add('hidden');
}
function closeDetail(){
  document.getElementById('feed-view').classList.remove('hidden');
  ['view-toggle','tag-filter-row'].forEach(id=>document.getElementById(id).style.display='flex');
  document.getElementById('detail-screen').classList.remove('active');
  document.getElementById('fab').classList.remove('hidden');
}
document.getElementById('today-pill').textContent=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
loadEntries();
</script>
